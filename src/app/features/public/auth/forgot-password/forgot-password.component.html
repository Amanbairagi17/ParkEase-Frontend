<div class="auth-center">
  <div class="card">
    <div class="logo"><span class="logo-icon">P</span><span>ParkEase</span></div>
    <h1>Forgot password</h1>
    <p class="subtitle">Enter your email and we'll send an OTP.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <div class="field">
        <label>Email</label>
        <input formControlName="email" type="email" placeholder="you@example.com">
        <span class="err" *ngIf="f['email'].touched && f['email'].errors?.['email']">Valid email required</span>
      </div>
      @if (success) { <div class="alert-success">OTP sent! Check your inbox.</div> }
      @if (error) { <div class="alert-error">{{ error }}</div> }
      <button type="submit" class="btn-primary" [disabled]="submitting">
        {{ submitting ? 'Sending…' : 'Send OTP' }}
      </button>
    </form>
    <p class="switch-auth"><a routerLink="/login">← Back to login</a></p>
  </div>
</div>
