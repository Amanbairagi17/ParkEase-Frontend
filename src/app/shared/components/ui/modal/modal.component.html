<div class="ui-modal" [class.ui-modal--open]="open" aria-hidden="true">
  <div class="ui-modal__backdrop" (click)="close.emit()"></div>
  <div class="ui-modal__panel" role="dialog" aria-modal="true">
    <header class="ui-modal__header">
      <h3>{{ title }}</h3>
      <button class="ui-modal__close" (click)="close.emit()" aria-label="Close">
        <span class="material-icons">close</span>
      </button>
    </header>
    <div class="ui-modal__content">
      <ng-content></ng-content>
    </div>
  </div>
</div>
