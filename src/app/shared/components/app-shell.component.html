<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="sidebarOpen" role="navigation" aria-label="Primary">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-box">P</div>
        <span class="logo-text">ParkEase</span>
      </div>
      <button class="close-sidebar-btn" (click)="closeSidebar()" aria-label="Close menu">
        <span class="material-icons">close</span>
      </button>
    </div>

    <nav class="sidebar-nav">
      @for (item of navItems; track item.href) {
          <a [routerLink]="item.href"
            routerLinkActive="active"
            class="nav-item"
            (click)="closeSidebar()">
          <span class="material-icons nav-icon">{{ item.icon }}</span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="user-avatar">
          <img *ngIf="user?.profilePicUrl" [src]="user?.profilePicUrl" alt="User avatar">
          <span *ngIf="!user?.profilePicUrl">{{ initials }}</span>
        </div>
        <div class="user-meta">
          <span class="user-name">{{ user?.fullName }}</span>
          <span class="user-role">{{ user?.role | titlecase }}</span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" title="Sign Out">
        <span class="material-icons">logout</span>
      </button>
    </div>
  </aside>

  <!-- Mobile Backdrop -->
  <div class="sidebar-backdrop" [class.active]="sidebarOpen" (click)="closeSidebar()" aria-hidden="true"></div>

  <div class="main-content">
    <!-- Header -->
    <header class="navbar">
      <div class="navbar-left">
        <button class="mobile-menu-btn" (click)="openSidebar()" aria-label="Open menu" [attr.aria-expanded]="sidebarOpen">
          <span class="material-icons">menu</span>
        </button>
        <!-- Logo shown ONLY on mobile when sidebar is hidden -->
        <div class="mobile-logo">
          <div class="logo-box-sm">P</div>
          <span class="logo-text-sm">ParkEase</span>
        </div>
        <h2 class="page-title-hidden">Dashboard</h2>
      </div>

      <div class="navbar-right">
        <app-notification-bell></app-notification-bell>

        <div class="v-divider"></div>

        <div class="nav-profile" routerLink="/driver/profile">
          <span class="nav-user-name">{{ user?.fullName }}</span>
          <div class="nav-avatar">
            <img *ngIf="user?.profilePicUrl" [src]="user?.profilePicUrl" alt="User avatar">
            <span *ngIf="!user?.profilePicUrl">{{ initials }}</span>
          </div>
        </div>
      </div>
    </header>

    <main class="router-content animate-in">
      <router-outlet />
    </main>
  </div>
</div>
